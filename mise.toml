[tools]
go = "1.25.5"
gofumpt = "latest"
golangci-lint = "2.8.0"

[tasks.build]
alias = ["b"]
description = "Build the Go project"
outputs = ["bin/ado"]
sources = ["**/*.go"]
# TODO (tai): rename the output binary
run = "go build -o bin/ado ."

[tasks.run]
alias = ["r"]
depends = ["build"]
run = "bin/ado"

[tasks.lint]
run = "golangci-lint run --fix ./..."
