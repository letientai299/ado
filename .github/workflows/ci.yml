name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-${{ runner.os }}-
      - name: Build
        run: mise run build
      - name: Lint
        run: mise run lint
      - name: Test
        run: mise run test

  release:
    name: Release (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: check
    # Temporarily disabled to test the fix on PR
    # if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  goos: linux,   goarch: amd64 }
          - { os: ubuntu-latest,  goos: linux,   goarch: arm64 }
          - { os: macos-latest,   goos: darwin,  goarch: amd64 }
          - { os: macos-latest,   goos: darwin,  goarch: arm64 }
          - { os: windows-latest, goos: windows, goarch: amd64 }
          - { os: windows-latest, goos: windows, goarch: arm64 }
    env:
      BINARY: ado-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/Library/Caches/go-build
            ~\AppData\Local\go-build
            ~/go/pkg/mod
            ~\go\pkg\mod
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Generate code (native arch)
        shell: bash
        run: mise run generate

      - name: Build release binary
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: mise run release

      - name: Rename binary
        shell: bash
        run: mv bin/ado bin/${{ env.BINARY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY }}
          path: bin/${{ env.BINARY }}

  publish:
    name: Publish Release
    needs: release
    # Temporarily disabled to test the fix on PR
    # if: startsWith(github.ref, 'refs/tags/v')
    if: false  # Keep disabled as we don't want to actually publish from PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
