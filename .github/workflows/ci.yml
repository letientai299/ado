name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key:
            go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-${{ runner.os }}-${{ runner.arch }}-
      - name: Build
        run: mise run build
      - name: Lint
        run: mise run lint
      - name: Test
        run: mise run test

  release:
    name: Release (${{ matrix.os }})
    needs: check
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, platform: linux-amd64 }
          - { os: macos-latest, platform: darwin-arm64 } # Apple Silicon (arm64)
          - { os: windows-latest, platform: windows-amd64 }
    env:
      BINARY:
        ado-${{ matrix.platform }}${{ contains(matrix.platform, 'windows') &&
        '.exe' || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/Library/Caches/go-build
            ~\AppData\Local\go-build
            ~/go/pkg/mod
            ~\go\pkg\mod
          key:
            go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-${{ runner.os }}-${{ runner.arch }}-

      - name: Build release binary (native)
        shell: bash
        run: mise run release

      - name: Rename binary
        shell: bash
        run: |
          if [ -f "bin/ado.exe" ]; then
            mv bin/ado.exe bin/${{ env.BINARY }}
          else
            mv bin/ado bin/${{ env.BINARY }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY }}
          path: bin/${{ env.BINARY }}

  publish:
    name: Publish Release
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*
