name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-${{ runner.os }}-
      - name: Build
        run: mise run build
      - name: Lint
        run: mise run lint
      - name: Test
        run: mise run test

  release:
    name: Release (${{ matrix.goos }}-${{ matrix.goarch }})
    needs: check
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest,  goos: linux,   goarch: amd64 }
          - { os: ubuntu-latest,  goos: linux,   goarch: arm64 }
          - { os: macos-latest,   goos: darwin,  goarch: amd64 }
          - { os: macos-latest,   goos: darwin,  goarch: arm64 }
          - { os: windows-latest, goos: windows, goarch: amd64 }
          - { os: windows-latest, goos: windows, goarch: arm64 }
    env:
      BINARY: ado-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/Library/Caches/go-build
            ~\AppData\Local\go-build
            ~/go/pkg/mod
            ~\go\pkg\mod
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: go-${{ runner.os }}-

      - name: Install UPX
        shell: bash
        run: |
          case "${{ matrix.goos }}" in
            linux)
              curl -sL https://github.com/upx/upx/releases/download/v5.1.0/upx-5.1.0-${{ matrix.goarch }}_linux.tar.xz | tar xJ
              sudo mv upx-5.1.0-${{ matrix.goarch }}_linux/upx /usr/local/bin/
              ;;
            darwin) brew install upx ;;
            windows) choco install upx ;;
          esac

      - name: Build release binary
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: mise run release

      - name: Compress binary with UPX
        shell: bash
        run: upx --best --lzma bin/ado || true

      - name: Rename binary
        shell: bash
        run: mv bin/ado bin/${{ env.BINARY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY }}
          path: bin/${{ env.BINARY }}

  publish:
    name: Publish Release
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine release info
        id: release_info
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "is_experimental=false" >> $GITHUB_OUTPUT
          else
            echo "tag=experimental" >> $GITHUB_OUTPUT
            echo "is_experimental=true" >> $GITHUB_OUTPUT
          fi

      - name: Delete existing experimental release
        if: steps.release_info.outputs.is_experimental == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete experimental --yes --cleanup-tag || true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.release_info.outputs.is_experimental }}" = "true" ]; then
            gh release create "${{ steps.release_info.outputs.tag }}" \
              --title "Experimental Build" \
              --notes "Automated build from main branch (commit: ${{ github.sha }})" \
              --prerelease \
              artifacts/*
          else
            gh release create "${{ steps.release_info.outputs.tag }}" \
              --title "Release ${{ steps.release_info.outputs.tag }}" \
              --generate-notes \
              artifacts/*
          fi
